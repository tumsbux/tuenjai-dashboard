<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sales Dashboard — เตือนใจ พาณิชย์กรุ๊ป</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root{color-scheme:light;--blue:#1e3a5f;--accent:#3b82f6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
.topbar{background:var(--blue);color:#fff;padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.logo{font-size:17px;font-weight:800;}
.logo span{font-size:11px;font-weight:400;opacity:.7;display:block;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;flex:1;}
.breadcrumb a{color:#93c5fd;cursor:pointer;text-decoration:underline;}
.breadcrumb a:hover{color:#bfdbfe;}
.breadcrumb .cur{color:#fff;cursor:default;text-decoration:none;}
.breadcrumb .sep{color:#475569;}
.topdate{font-size:11px;opacity:.75;text-align:right;line-height:1.6;}
.main{padding:16px 20px;max-width:1280px;margin:0 auto;}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:18px;}
.kpi{background:var(--card);border-radius:10px;padding:13px 15px;box-shadow:0 1px 3px rgba(0,0,0,.07);border-top:3px solid var(--border);}
.kpi.k-blue{border-top-color:var(--accent);} .kpi.k-green{border-top-color:var(--green);}
.kpi.k-red{border-top-color:var(--red);} .kpi.k-amber{border-top-color:var(--amber);}
.kpi.k-purple{border-top-color:var(--purple);} .kpi.k-teal{border-top-color:#14b8a6;}
.kpi-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;}
.kpi-val{font-size:20px;font-weight:800;line-height:1;} .kpi-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.hero{background:var(--card);border-radius:12px;padding:16px 18px;margin-bottom:18px;box-shadow:0 2px 6px rgba(0,0,0,.07);}
.hero-hd{font-size:14px;font-weight:700;color:var(--blue);margin-bottom:12px;}
.hero-body{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start;}
.gauge-col{flex:0 0 180px;display:flex;flex-direction:column;align-items:center;}
.stats-grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:9px;min-width:240px;}
.stat-box{background:#f8fafc;border-radius:8px;padding:9px 11px;}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;}
.stat-val{font-size:14px;font-weight:700;}
.urgency{margin-top:12px;border-radius:8px;padding:10px 14px;font-size:13px;line-height:1.5;}
.urgency.u-green{background:#dcfce7;color:#166534;border-left:4px solid var(--green);}
.urgency.u-amber{background:#fef9c3;color:#854d0e;border-left:4px solid var(--amber);}
.urgency.u-red{background:#fee2e2;color:#991b1b;border-left:4px solid var(--red);}
.urgency strong{display:block;margin-bottom:2px;}
.sec-hd{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:9px;display:flex;align-items:center;gap:8px;}
.sec-hd .cnt{font-weight:400;color:var(--muted);font-size:12px;}
.tbl-wrap{background:var(--card);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:18px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:560px;}
thead{background:var(--blue);color:#fff;}
th{padding:8px 11px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.3px;white-space:nowrap;}
td{padding:8px 11px;border-bottom:1px solid #f1f5f9;font-size:12.5px;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr.click{cursor:pointer;transition:background .12s;}
tr.click:hover{background:#eff6ff;}
.arrow{color:#94a3b8;font-size:11px;}
tr.click:hover .arrow{color:var(--accent);}
.pos{color:#16a34a;font-weight:700;} .neg{color:#dc2626;font-weight:700;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;}
.b-gray{background:#f1f5f9;color:var(--muted);} .b-blue{background:#dbeafe;color:#1d4ed8;}
.b-green{background:#dcfce7;color:#16a34a;} .b-amber{background:#fef9c3;color:#ca8a04;}
.b-red{background:#fee2e2;color:#dc2626;}
.spark{display:flex;align-items:center;gap:6px;}
.spark-bar{flex:0 0 56px;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;}
.spark-fill{height:100%;border-radius:3px;}
.detail-card{background:var(--card);border-radius:12px;padding:16px 18px;box-shadow:0 2px 6px rgba(0,0,0,.07);margin-bottom:16px;}
.detail-card h2{font-size:16px;font-weight:800;color:var(--blue);}
.detail-card .meta{font-size:12px;color:var(--muted);margin-top:3px;margin-bottom:14px;}
.yoy-compare{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:14px;}
.yc-box{border-radius:10px;padding:12px;text-align:center;}
.yc-box.y25{background:#f0f9ff;border:1px solid #bae6fd;}
.yc-box.y26{background:#f0fdf4;border:1px solid #bbf7d0;}
.yc-year{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600;}
.yc-amt{font-size:20px;font-weight:800;}
.yc-box.y25 .yc-amt{color:#0369a1;} .yc-box.y26 .yc-amt{color:#16a34a;}
.yc-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.yc-arrow{text-align:center;}
.yc-pct{font-size:22px;font-weight:800;}
.chart-wrap{background:var(--card);border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:18px;}
.chart-wrap h3{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:10px;}
.insight{border-radius:8px;padding:10px 14px;margin-bottom:13px;font-size:13px;line-height:1.5;}
.insight.i-green{background:#f0fdf4;border-left:4px solid var(--green);color:#166534;}
.insight.i-amber{background:#fff7ed;border-left:4px solid var(--amber);color:#9a3412;}
.insight.i-red{background:#fee2e2;border-left:4px solid var(--red);color:#991b1b;}
.insight strong{display:block;margin-bottom:2px;}
.back-btn{display:inline-flex;align-items:center;gap:5px;background:#e0e7ff;color:#3730a3;border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:12px;}
.back-btn:hover{background:#c7d2fe;}
.search-wrap{margin-bottom:10px;}
.search-wrap input{width:100%;max-width:320px;border:1px solid var(--border);border-radius:6px;padding:6px 11px;font-size:13px;outline:none;}
.search-wrap input:focus{border-color:var(--accent);}
.month-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.month-box{border-radius:8px;padding:12px;}
.month-box.m25{background:#f0f9ff;border:1px solid #bae6fd;}
.month-box.m26{background:#f0fdf4;border:1px solid #bbf7d0;}
.month-box-title{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;}
.month-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid rgba(0,0,0,.05);}
.month-row:last-child{border-bottom:none;}
.month-row .label{color:var(--muted);}
.month-row .val{font-weight:600;}

/* ── REPORT PAGE ── */
.rpt-page{padding:0 0 24px;}
.rpt-top{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:start;background:linear-gradient(135deg,#166534,#15803d);color:#fff;padding:16px 20px;border-radius:10px;margin-bottom:14px;}
.rpt-title{font-size:22px;font-weight:900;letter-spacing:-.3px;}
.rpt-sub{font-size:12px;opacity:.85;margin-top:3px;}
.rpt-date-box{background:rgba(255,255,255,.15);border-radius:8px;padding:8px 14px;text-align:center;font-size:12px;line-height:1.6;}
.rpt-date-box strong{font-size:14px;display:block;}
.rpt-hl-box{background:rgba(255,255,255,.12);border-radius:8px;padding:10px 14px;min-width:220px;}
.rpt-hl-title{font-size:12px;font-weight:800;letter-spacing:.5px;margin-bottom:6px;color:#bbf7d0;}
.rpt-hl-item{font-size:11.5px;padding:1px 0;}
.rpt-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.rpt-kpi-card{border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);}
.rpt-kpi-card.gold{background:linear-gradient(135deg,#fef9c3,#fde68a);border:1px solid #f59e0b;}
.rpt-kpi-card.green{background:linear-gradient(135deg,#dcfce7,#bbf7d0);border:1px solid #22c55e;}
.rpt-kpi-card.red{background:linear-gradient(135deg,#fee2e2,#fecaca);border:1px solid #ef4444;}
.rpt-kpi-card.blue{background:linear-gradient(135deg,#dbeafe,#bfdbfe);border:1px solid #3b82f6;}
.rpt-kpi-card.teal{background:linear-gradient(135deg,#ccfbf1,#99f6e4);border:1px solid #14b8a6;}
.rpt-kpi-card.purple{background:linear-gradient(135deg,#ede9fe,#ddd6fe);border:1px solid #8b5cf6;}
.rpt-kpi-icon{font-size:24px;}
.rpt-kpi-main{font-size:20px;font-weight:900;line-height:1.1;}
.rpt-kpi-lbl{font-size:10.5px;color:var(--muted);margin-top:2px;}
.rpt-kpi-sub{font-size:10px;color:#166534;font-weight:600;}
.rpt-rm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.rpt-rm-card{border:2px solid #16a34a;border-radius:10px;overflow:hidden;}
.rpt-rm-hd{background:#16a34a;color:#fff;padding:8px 12px;display:flex;align-items:center;gap:6px;}
.rpt-rm-hd.best{background:#14532d;}
.rpt-rm-code{font-size:16px;font-weight:900;}
.rpt-rm-name{font-size:10px;opacity:.85;flex:1;}
.rpt-rm-kpis{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid #dcfce7;}
.rpt-rm-kpi{text-align:center;padding:7px 3px;border-right:1px solid #dcfce7;}
.rpt-rm-kpi:last-child{border-right:none;}
.rpt-rm-val{font-size:13px;font-weight:800;}
.rpt-rm-lbl{font-size:9px;color:var(--muted);}
.rpt-dm-tbl{width:100%;border-collapse:collapse;font-size:10px;}
.rpt-dm-tbl th{background:#f0fdf4;padding:3px 5px;text-align:left;font-weight:700;color:#166534;border-bottom:1px solid #dcfce7;white-space:nowrap;}
.rpt-dm-tbl td{padding:3px 5px;border-bottom:1px solid #f0fdf4;white-space:nowrap;}
.rpt-dm-total td{background:#f0fdf4;font-weight:700;}
.pos{color:#16a34a;} .neg{color:#dc2626;}
.rpt-bottom{display:grid;grid-template-columns:1.1fr 1.4fr 1fr 1fr;gap:12px;margin-bottom:14px;}
.rpt-bottom-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px;}
.rpt-sec-title{font-size:11px;font-weight:800;color:#166534;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px;}
.rpt-rank-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:11px;}
.rpt-rank-row:last-child{border-bottom:none;}
.rpt-rank-medal{font-size:14px;width:20px;}
.rpt-rank-name{flex:1;font-weight:600;}
.rpt-rank-val{font-size:11px;font-weight:700;}
.rpt-action-item{font-size:10.5px;padding:4px 0;border-bottom:1px solid #f0fdf4;display:flex;gap:5px;align-items:flex-start;}
.rpt-action-item:last-child{border-bottom:none;}
.rpt-action-urgent{background:#fef2f2;border-radius:6px;padding:5px 8px;font-size:10.5px;color:#dc2626;font-weight:600;margin-bottom:4px;}
.rpt-footer{background:linear-gradient(90deg,#f0fdf4,#dcfce7);border-radius:8px;padding:10px 16px;font-size:11px;color:#166534;font-weight:600;text-align:center;}
.rpt-nav-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;margin-left:8px;}
.rpt-nav-btn:hover{background:rgba(255,255,255,.35);}
.gp-badge{display:inline-block;background:#dcfce7;color:#166534;border-radius:4px;padding:1px 5px;font-size:10px;font-weight:700;}

/* ─── Executive Page ─────────────────────────────────────── */
.exec-wrap{background:#f0fdf4;min-height:100vh;padding:0;}
.exec-header{background:linear-gradient(135deg,#14532d,#16a34a);color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;border-radius:0 0 16px 16px;}
.exec-title{font-size:26px;font-weight:900;letter-spacing:-.5px;}
.exec-period{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.4);border-radius:10px;padding:8px 18px;font-size:14px;font-weight:700;text-align:center;}
.exec-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px;}
.exec-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.exec-card-hd{font-size:13px;font-weight:800;color:#14532d;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.exec-card-num{background:#fff9f0;border-radius:8px;padding:4px 12px;}
.exec-kpi-main{background:linear-gradient(135deg,#16a34a,#22c55e);border-radius:12px;padding:14px 18px;color:#fff;margin-bottom:12px;}
.exec-kpi-main-val{font-size:36px;font-weight:900;line-height:1.1;}
.exec-kpi-main-lbl{font-size:12px;opacity:.85;}
.exec-kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.exec-kpi-box{background:#f8fafc;border-radius:10px;padding:10px 14px;}
.exec-kpi-box-lbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;}
.exec-kpi-box-val{font-size:18px;font-weight:800;color:#0f172a;}
.exec-kpi-box-sub{font-size:11px;margin-top:2px;}
.exec-green{color:#16a34a;} .exec-red{color:#dc2626;} .exec-amber{color:#d97706;}
.exec-insight{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 12px;font-size:12px;color:#166534;margin-top:8px;}
.rm-bar-section{margin-top:4px;}
.rm-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px;}
.rm-tbl td{padding:4px 8px;border-bottom:1px solid #f1f5f9;text-align:center;}
.rm-tbl td:first-child{text-align:left;font-weight:700;}
.dm-rank-list{list-style:none;padding:0;margin:0;}
.dm-rank-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:13px;}
.dm-rank-item:last-child{border-bottom:none;}
.dm-rank-name{font-weight:600;color:#0f172a;}
.dm-rank-pct{font-weight:800;font-size:14px;}
.forecast-box{display:flex;gap:12px;margin-bottom:12px;}
.forecast-item{flex:1;background:#f8fafc;border-radius:10px;padding:10px;text-align:center;}
.forecast-item-val{font-size:20px;font-weight:800;color:#16a34a;}
.forecast-item-lbl{font-size:10px;color:#64748b;margin-top:2px;}
.insight-list{list-style:none;padding:0;margin:0;}
.insight-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:12px;}
.insight-item:last-child{border-bottom:none;}
.insight-icon{font-size:18px;flex-shrink:0;}
.insight-text strong{display:block;font-size:13px;margin-bottom:1px;}
.challenge-bars{display:flex;align-items:flex-end;gap:16px;height:80px;margin:8px 0;}
.ch-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.ch-bar{width:100%;border-radius:6px 6px 0 0;}
.ch-bar-lbl{font-size:10px;color:#475569;text-align:center;line-height:1.3;}
.growth-driver-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.gd-box{background:#f8fafc;border-radius:10px;padding:12px;text-align:center;}
.gd-icon{font-size:28px;margin-bottom:4px;}
.gd-val{font-size:22px;font-weight:900;}
.gd-lbl{font-size:10px;color:#64748b;margin-top:2px;}
.gd-sub{font-size:11px;color:#475569;margin-top:8px;text-align:center;}
@media(max-width:700px){.exec-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">📊 Sales Dashboard<span>เตือนใจ พาณิชย์กรุ๊ป จำกัด</span></div>

const B=n=>n==null?'–':'฿'+Math.round(n).toLocaleString('th-TH');
const Bs=n=>{
  if(n==null)return'–';
  const abs=Math.abs(n);
  if(abs>=1e9)return'฿'+(n/1e9).toFixed(2)+'B';
  if(abs>=1e6)return'฿'+(n/1e6).toFixed(2)+'M';
  if(abs>=1e3)return'฿'+(n/1e3).toFixed(0)+'K';
  return'฿'+Math.round(n).toLocaleString();
};
const yoySpan=v=>{
  if(v==null)return'<span class="b-gray badge">–</span>';
  const cls=v>=0?'pos':'neg',icon=v>=0?'▲':'▼';
  const bar=Math.min(Math.abs(v),100)/100*56;
  return`<div class="spark"><div class="spark-bar"><div class="spark-fill ${cls}" style="width:${bar}px"></div></div><span class="${cls}">${icon} ${Math.abs(v).toFixed(1)}%</span></div>`;
};
const tgtBadge=pct=>{
  if(pct==null)return'<span class="badge b-gray">–</span>';
  const cls=pct>=100?'b-green':'b-red';
  const icon=pct>=100?'✓':'✗';
  return`<span class="badge ${cls}">${icon} ${pct.toFixed(1)}%</span>`;
};

// ─── CHART: Monthly bar (2026 + 2025) ──────────────────────────
function drawMonthChart(canvasId, m26, m25, projMay=null){
  const el=document.getElementById(canvasId); if(!el)return;
  const MLBL=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const toArr=(obj,yr)=>Array.from({length:12},(_,i)=>{
    const key=`${yr}-${String(i+1).padStart(2,'0')}`;
    if(yr==='2026'&&i===4&&projMay!=null)return projMay/1e6;
    return obj[key]!=null?obj[key]/1e6:null;
  });
  const d25=toArr(m25,'2025'), d26=toArr(m26,'2026');
  if(charts[canvasId]){charts[canvasId].destroy();delete charts[canvasId];}
  charts[canvasId]=new Chart(el,{
    type:'line',
    data:{labels:MLBL,datasets:[
      {label:'2025',data:d25,borderColor:'rgba(14,165,233,1)',backgroundColor:'rgba(14,165,233,.12)',borderWidth:2.5,pointRadius:4,pointHoverRadius:6,fill:true,tension:0.35,spanGaps:false},
      {label:'2026 (พ.ค.=Proj)',data:d26,borderColor:'rgba(16,185,129,1)',backgroundColor:'rgba(16,185,129,.18)',borderWidth:2.5,pointRadius:4,pointHoverRadius:6,fill:true,tension:0.35,spanGaps:false},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{boxWidth:12,font:{size:11}}},
        tooltip:{mode:'index',intersect:false,callbacks:{label:ctx=>ctx.raw!=null?` ${ctx.dataset.label}: ฿${ctx.raw.toFixed(2)}M`:null}}},
      scales:{y:{ticks:{callback:v=>'฿'+v.toFixed(1)+'M',font:{size:10}},grid:{color:'#f1f5f9'}},x:{ticks:{font:{size:10}}}}}
  });
}

// ─── CHART: Gauge ───────────────────────────────────────────────
function drawGauge(id,pct,color){
  if(charts[id]){charts[id].destroy();delete charts[id];}
  const el=document.getElementById(id);if(!el)return;
  const capped=Math.min(Math.abs(pct||0),100);
  charts[id]=new Chart(el,{
    type:'doughnut',
    data:{datasets:[{data:[capped,100-capped],backgroundColor:[color,'#e2e8f0'],borderWidth:0,circumference:180,rotation:270}]},
    options:{responsive:true,animation:{duration:600},plugins:{legend:{display:false},tooltip:{enabled:false}},cutout:'70%'}
  });
}

function goExec(){destroyCharts();view='exec';selRM=null;selDM=null;selStore=null;render();}
function goRM(rm){destroyCharts();view='rm';selRM=rm;selDM=null;selStore=null;render();}
function goDM(dc){
  destroyCharts();view='dm';selDM=dc;selStore=null;
  const d=DM.find(x=>x.dm_code===dc);if(d&&!selRM)selRM=d.rm;
  render();
}
function goStore(code){
  destroyCharts();view='store';selStore=code;
  const s=ST.find(x=>x.code===code);
  if(s){if(!selDM)selDM=s.dm_code;if(!selRM)selRM=s.rm;}
  render();
}

// ─── Breadcrumb ───────────────────────────────────────────────────
function renderBC(){
  let p=[];
  if(view==='exec'){document.getElementById('bc').innerHTML='<span class="cur">📊 Executive Dashboard</span>';return;}
  if(view==='report'){document.getElementById('bc').innerHTML='<span class="cur">📋 รายงาน MTD</span>';return;}
  p.push(view==='home'?`<span class="cur">ภาพรวม</span>`:`<a onclick="goHome()">ภาพรวม</a>`);
  if(selRM&&view!=='home'){
    p.push('<span class="sep">›</span>');
    p.push(view==='rm'?`<span class="cur">${selRM}</span>`:`<a onclick="goRM('${selRM}')">${selRM}</a>`);
  }
  if(selDM!=null&&(view==='dm'||view==='store')){
    const d=DM.find(x=>x.dm_code===selDM);
    if(d){p.push('<span class="sep">›</span>');p.push(view==='dm'?`<span class="cur">${d.dm_name}</span>`:`<a onclick="goDM('${selDM}')">${d.dm_name}</a>`);}
  }
  if(view==='store'&&selStore!=null){
    const s=ST.find(x=>String(x.code)===String(selStore));
    if(s)p.push(`<span class="sep">›</span><span class="cur">${s.name}</span>`);
  }
  document.getElementById('bc').innerHTML=p.join('');
}

        <div class="rpt-kpi-main">${tgt.toFixed(2)}%</div>
        <div class="rpt-kpi-lbl">เทียบเป้า</div>
        <div class="rpt-kpi-sub">${tgt>=100?`เกินเป้า +฿${excessM}M`:'ต่ำกว่าเป้า'}</div>
      </div>
    </div>
    <div class="rpt-kpi-card ${yoy>=0?'green':'red'}">
      <div class="rpt-kpi-icon">&#x1F4C8;</div>
      <div>
        <div class="rpt-kpi-main">${yoy>=0?'+':''}${yoy.toFixed(2)}%</div>
        <div class="rpt-kpi-lbl">YoY Projected</div>
        <div class="rpt-kpi-sub">Proj ${Bs(S.total_proj)} vs พ.ค.25</div>
      </div>
    </div>
    <div class="rpt-kpi-card teal">
      <div class="rpt-kpi-icon">&#x1F4CA;</div>
      <div>
        <div class="rpt-kpi-main">${gp.toFixed(2)}%</div>
        <div class="rpt-kpi-lbl">Est. GP% MTD</div>
        <div class="rpt-kpi-sub">&#x2248; ฿${(S.total_gp_mtd/1e6).toFixed(2)}M กำไรขั้นต้น</div>
      </div>
    </div>
  </div>

  <div class="rpt-rm-grid">${rmCards}</div>

  <div class="rpt-bottom">
    <div class="rpt-bottom-card">
      <div class="rpt-sec-title">สัดส่วนยอดขาย RM</div>
      <div style="height:190px"><canvas id="chartRptPie"></canvas></div>
    </div>
    <div class="rpt-bottom-card">
      <div class="rpt-sec-title">เปรียบเทียบแต่ละ RM</div>
      <div style="height:190px"><canvas id="chartRptBar"></canvas></div>
    </div>
    <div class="rpt-bottom-card">
      <div class="rpt-sec-title">&#x1F3C6; เขตเติบโตสูงสุด (YoY%)</div>
      ${rankings}
    </div>
    <div class="rpt-bottom-card">
      <div class="rpt-sec-title" style="color:#dc2626">&#x1F4CB; ACTION PLAN</div>
      ${actionUrgent}
      <div class="rpt-action-item">&#x1F4E2; Push ยอดขาย ${S.days_remaining} วันที่เหลือ</div>
      <div class="rpt-action-item">&#x1F3AF; ติดตาม DM ที่ YoY ติดลบ</div>
      <div class="rpt-action-item">&#x1F3EA; เติมสินค้า Top ไม่ให้ขาด</div>
      <div class="rpt-action-item">&#x1F465; กระตุ้น Avg Ticket ต่อใบเสร็จ</div>
      <div class="rpt-action-item">&#x1F4CA; Review GP% ต่อสาขารายสัปดาห์</div>
    </div>
  </div>

  <div class="rpt-footer">
    &#x1F4A1; MTD ${S.days_elapsed} วัน | Projected ${Bs(S.total_proj)} (${yoy>=0?'+':''}${yoy.toFixed(1)}% YoY) | เป้า ${Bs(S.total_target)} | ทำได้ ${tgt.toFixed(1)}% | Est. GP &#x2248; ${gp.toFixed(1)}%
  </div>
</div>`;
}

function updateTopDate(){
  const el=document.getElementById('td-days');
  if(el&&D.summary&&D.summary.days_elapsed) el.textContent=D.summary.days_elapsed;
}
function render(){
  const app=document.getElementById('app');
  if(view==='home') app.innerHTML=renderHome();
  else if(view==='rm') app.innerHTML=renderRM();
  else if(view==='dm') app.innerHTML=renderDM();
  else if(view==='store') app.innerHTML=renderStore();
  else if(view==='exec')   app.innerHTML=renderExec();
  else if(view==='report') app.innerHTML=renderReport();
  renderBC();
  window.scrollTo(0,0);

  setTimeout(()=>{
    if(view==='home'){
      const yoy=S.total_proj_yoy||0;
      drawGauge('gaugeMain',Math.abs(yoy),yoy>=0?'#10b981':'#ef4444');
      drawMonthChart('chartHome',S.m26_tot,S.m25_tot,S.total_proj);
    } else if(view==='rm'){
      const rm=RM.find(r=>r.rm===selRM);
      if(rm) drawMonthChart('chartRM',rm.m26,rm.m25,rm.proj);
    } else if(view==='dm'){
      const dm=DM.find(d=>String(d.dm_code)===String(selDM));
      if(dm) drawMonthChart('chartDM',dm.m26,dm.m25,dm.proj);
    } else if(view==='store'){
      const s=ST.find(x=>String(x.code)===String(selStore));
      if(s) drawMonthChart('chartStore',s.m26,s.m25,s.proj);
    } else if(view==='exec'){
      // RM bar chart
      const rmBar=document.getElementById('chartExecRM');
      if(rmBar){
        if(charts['execRM'])charts['execRM'].destroy();
        charts['execRM']=new Chart(rmBar,{
          type:'bar',
          data:{
            labels:RM.map(r=>r.rm_name.split(' ')[0]),
            datasets:[
              {label:'พ.ค. 2026 MTD',data:RM.map(r=>+(r.sales_mtd/1e6).toFixed(2)),backgroundColor:'#16a34a',borderRadius:6},
              {label:'พ.ค. 2025',data:RM.map(r=>+(r.s25_may/1e6).toFixed(2)),backgroundColor:'#bbf7d0',borderRadius:6}
            ]
          },
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},
            scales:{y:{ticks:{callback:v=>v+'M'}}}}
        });
      }
      // Daily trend sparkline
      const execLine=document.getElementById('chartExecLine');
      if(execLine){
        if(charts['execLine'])charts['execLine'].destroy();
        const days=Array.from({length:S.days_elapsed},(_,i)=>i+1);
        const dailyArr=days.map(d=>+(S.total_daily/1e6).toFixed(2));
        charts['execLine']=new Chart(execLine,{
          type:'line',
          data:{
            labels:days,
            datasets:[{
              label:'Daily Sales (M)',data:dailyArr,
              borderColor:'#16a34a',backgroundColor:'rgba(22,163,74,.1)',
              fill:true,tension:.4,pointRadius:3
            }]
          },
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
            scales:{y:{ticks:{callback:v=>v+'M'}}}}
        });
      }
    } else if(view==='report'){
      const pie=document.getElementById('chartRptPie');
      if(pie){
        if(charts['rptPie'])charts['rptPie'].destroy();
        charts['rptPie']=new Chart(pie,{
          type:'doughnut',
          data:{
            labels:RM.map(r=>r.rm+' '+r.rm_name),
            datasets:[{data:RM.map(r=>r.sales_mtd),
              backgroundColor:['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#06b6d4']}]
          },
          options:{responsive:true,maintainAspectRatio:false,
            plugins:{
              legend:{position:'bottom',labels:{font:{size:9},boxWidth:8}},
              tooltip:{callbacks:{label:ctx=>`฿${(ctx.raw/1e6).toFixed(2)}M (${((ctx.raw/S.total_mtd)*100).toFixed(1)}%)`}}
            }
          }
        });
      }
      const bar=document.getElementById('chartRptBar');
      if(bar){
        if(charts['rptBar'])charts['rptBar'].destroy();
        charts['rptBar']=new Chart(bar,{
          type:'bar',
          data:{
            labels:RM.map(r=>r.rm),
            datasets:[
              {label:'เทียบเป้า%',data:RM.map(r=>+(r.pct_target||0).toFixed(1)),backgroundColor:'rgba(22,163,74,.85)',borderRadius:4},
              {label:'YoY Proj%',data:RM.map(r=>+(r.proj_yoy||0).toFixed(1)),backgroundColor:'rgba(34,197,94,.45)',borderRadius:4}
            ]
          },
          options:{responsive:true,maintainAspectRatio:false,
            plugins:{
              legend:{position:'top',labels:{font:{size:9},boxWidth:8}},
              tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw.toFixed(1)}%`}}
            },
            scales:{
              y:{ticks:{callback:v=>v+'%',font:{size:9}}},
              x:{ticks:{font:{size:10}}}
            }
          }
        });
      }
    }
  },60);
}

render();updateTopDate();
</script>
</body>
</html>
